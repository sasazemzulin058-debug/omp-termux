name: Android build

# Cross-compiles the pi-natives addon for aarch64-linux-android (Termux/bionic)
# on a standard Ubuntu runner and uploads it as an artifact. This is the
# release/prebuilt path; on-device builds use android/scripts/build-termux.sh.
#
# The cross-compile uses the Android NDK directly (NDK clang as both compiler
# and linker) — cargo-zigbuild cannot provide bionic libc and is not a viable
# path for Android. The build script calls `napi build --target ...` directly
# so napi invokes `cargo build` (not cargo-zigbuild) with cargo/cc env pointing
# at the NDK clang.

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/natives/**"
      - "android/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    paths:
      - "crates/**"
      - "packages/natives/**"
      - "android/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

jobs:
  build:
    name: Cross-compile android-arm64 addon
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install Rust target for the repo-pinned toolchain
        # rust-toolchain.toml pins nightly-2026-04-29; rustup auto-activates it
        # for any cargo invocation in the repo. dtolnay's `targets:` input only
        # applies to the toolchain IT installs, so add the android target to the
        # pinned toolchain explicitly or the cross-build can't find std.
        run: |
          set -euo pipefail
          rustup show active-toolchain || rustup toolchain install
          rustup target add aarch64-linux-android

      - name: Install Android NDK r27
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27
          add-to-path: false

      - name: Apply android patches
        run: bash android/scripts/apply-patches.sh

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # bun's hoisting does not always surface @napi-rs/cli as a top-level
      # .bin. Add the explicit dep in a scratch workspace to guarantee the bin
      # exists when the build script needs it.
      - name: Ensure napi CLI is available
        run: |
          if [ ! -x node_modules/.bin/napi ]; then
            bun add --no-save @napi-rs/cli@3.7.0
          fi
          test -x node_modules/.bin/napi || { echo "napi still missing"; exit 1; }

      - name: Cross-compile native addon (NDK clang)
        env:
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
          CARGO_BUILD_JOBS: 2
        run: bash android/scripts/build-android-ci.sh

      - name: Upload addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi_natives.android-arm64
          path: |
            packages/natives/native/pi_natives.android-arm64.node
            packages/natives/native/pi_natives.android-arm64.node.sha256
          if-no-files-found: error
