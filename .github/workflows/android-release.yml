name: Android release

# On a pushed `v*` tag: cross-compile the android-arm64 addon via the Android
# NDK and attach it to the GitHub Release so Termux users can download a
# prebuilt .node instead of building on-device.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach to"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and attach android-arm64 addon
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install Rust target for the repo-pinned toolchain
        run: |
          set -euo pipefail
          rustup show active-toolchain || rustup toolchain install
          rustup target add aarch64-linux-android

      - name: Install Android NDK r27
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27
          add-to-path: false

      - name: Apply android patches
        run: bash android/scripts/apply-patches.sh

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Cross-compile native addon (NDK clang)
        env:
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
          CARGO_BUILD_JOBS: 2
        run: bash android/scripts/build-android-ci.sh

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            packages/natives/native/pi_natives.android-arm64.node
            packages/natives/native/pi_natives.android-arm64.node.sha256
          fail_on_unmatched_files: true
